version: '3.8'
services:
  redis:
    image: redis:alpine
    container_name: silhouette-llm-redis
    ports:
      - "6499:6379"
    volumes:
      - redis_data_llm:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: silhouette-llm-qdrant
    ports:
      - "6444:6333"
    volumes:
      - qdrant_data_llm:/qdrant/storage
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5

  reasoning-engine:
    build: ./reasoning_engine
    container_name: silhouette-reasoning-engine
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme_on_first_run}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: always

  neo4j:
    image: neo4j:5.15.0-community
    container_name: silhouette-llm-neo4j
    ports:
      - "7574:7474" # HTTP
      - "7787:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme_on_first_run}
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data_llm:/data
      - neo4j_plugins_llm:/plugins
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474/" ]
      interval: 10s
      timeout: 10s
      retries: 10

  bot:
    build: .
    container_name: silhouette-bot
    ports:
      - "3005:3005"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - silhouette_data:/app/data
      - silhouette_db:/app/db
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: always

  caddy:
    image: caddy:admin
    container_name: silhouette-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./dist:/usr/share/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot
    restart: always

volumes:
  redis_data_llm:
  qdrant_data_llm:
  neo4j_data_llm:
  neo4j_plugins_llm:
  silhouette_data:
  silhouette_db:
  caddy_data:
  caddy_config:
