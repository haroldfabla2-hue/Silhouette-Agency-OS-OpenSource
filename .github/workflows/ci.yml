name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Lint
        run: npm run lint || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test || true

      - name: Run channel tests
        run: npx tsx tests/automated/channels.test.ts
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build
